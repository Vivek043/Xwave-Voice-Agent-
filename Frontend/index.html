<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xwave — AI Voice Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background -->
  <canvas id="particles"></canvas>

  <!-- ── Top Bar ────────────────────────────────────────────────── -->
  <nav class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">X</div>
      <span class="topbar-brand">Xwave</span>
      <span class="version-tag">v2</span>
    </div>
    <div class="topbar-center">
      <div class="status-bar" id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Ready</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" id="new-session-btn" title="New session">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="topbar-btn" id="debug-toggle" title="Debug panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
    </div>
  </nav>

  <!-- ── Sentiment Live Strip ───────────────────────────────────── -->
  <div class="sentiment-strip hidden" id="sentiment-strip">
    <div class="sentiment-track">
      <div class="sentiment-fill" id="sentiment-fill"></div>
      <div class="sentiment-thumb" id="sentiment-thumb"></div>
    </div>
    <div class="sentiment-info">
      <span class="sentiment-emoji" id="sentiment-emoji">😐</span>
      <span class="sentiment-label" id="sentiment-label">NEUTRAL</span>
      <span class="sentiment-score" id="sentiment-score">0.00</span>
    </div>
  </div>

  <!-- ── Main Content ───────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- Welcome Screen -->
    <div class="welcome" id="welcome-screen">
      <div class="welcome-orb">
        <div class="orb-ring orb-ring-1"></div>
        <div class="orb-ring orb-ring-2"></div>
        <div class="orb-core">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
          </svg>
        </div>
      </div>
      <h1 class="welcome-title">What can I help you with?</h1>
      <p class="welcome-sub">Voice-powered AI agent with knowledge retrieval and autonomous actions</p>
      <div class="feature-pills">
        <span class="pill"><span class="pill-dot pill-dot-rag"></span>RAG Knowledge Base</span>
        <span class="pill"><span class="pill-dot pill-dot-tool"></span>Tool Calling</span>
        <span class="pill"><span class="pill-dot pill-dot-sent"></span>Sentiment Routing</span>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area"></div>

    <!-- Escalation banner -->
    <div class="escalation-banner hidden" id="escalation-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Escalated to human specialist</span>
    </div>

  </main>

  <!-- ── Input Dock ─────────────────────────────────────────────── -->
  <footer class="dock">
    <div class="dock-inner">

      <!-- Text input -->
      <div class="text-input-wrap">
        <input type="text" class="text-input" id="text-input" placeholder="Type a message..." autocomplete="off" />
        <button class="send-btn" id="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

      <!-- Divider -->
      <div class="dock-divider"></div>

      <!-- Mic button -->
      <button class="mic-btn" id="mic-btn" title="Hold to speak">
        <svg class="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
        <span class="mic-label" id="mic-label">HOLD</span>
        <div class="mic-ripple"></div>
      </button>

    </div>

    <!-- Transcript -->
    <div class="transcript" id="transcript">
      <span id="transcript-text"></span>
    </div>
  </footer>

  <!-- ── Debug Panel (slide-in) ─────────────────────────────────── -->
  <div class="debug-panel hidden" id="debug-panel">
    <div class="debug-header">
      <span>Agent Trace</span>
      <a href="https://smith.langchain.com" target="_blank" class="debug-link">LangSmith</a>
    </div>
    <pre class="debug-output" id="debug-output">Waiting for first turn...</pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
