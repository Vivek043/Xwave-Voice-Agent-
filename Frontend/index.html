<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xwave — AI Voice Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating particles background -->
  <canvas id="particles"></canvas>

  <!-- Top bar -->
  <nav class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" id="sidebar-toggle" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
    </div>
    <div class="topbar-center">
      <span class="topbar-brand">Xwave</span>
    </div>
    <div class="topbar-right">
      <!-- reserved for future controls -->
    </div>
  </nav>

  <!-- Main content -->
  <main class="main">

    <!-- Welcome State (shown when no messages) -->
    <div class="welcome" id="welcome-screen">
      <div class="welcome-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10"/>
          <path d="M22 2L13 11"/>
          <path d="M16 2h6v6"/>
        </svg>
      </div>
      <h1 class="welcome-title">Hey there!<br>How can I assist you?</h1>
      <p class="welcome-subtitle">I'm available 24/7 for you. Just hold the mic and speak.</p>

      <!-- Sentiment indicator (appears after first turn) -->
      <div class="sentiment-chip hidden" id="sentiment-chip">
        <span id="sentiment-emoji">😐</span>
        <span id="sentiment-label">Listening...</span>
        <span class="sentiment-score-text" id="sentiment-score">—</span>
      </div>
    </div>

    <!-- Chat area (grows as conversation progresses) -->
    <div class="chat-area" id="chat-area">
      <!-- Messages inserted here by JS -->
    </div>

    <!-- Escalation banner -->
    <div class="escalation-banner hidden" id="escalation-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Session escalated to a human specialist</span>
    </div>

  </main>

  <!-- Bottom control dock -->
  <footer class="dock">

    <!-- Transcript bar -->
    <div class="transcript-bar" id="transcript-bar">
      <span id="transcript-text"></span>
    </div>

    <!-- Mic + input row -->
    <div class="input-row">
      <button class="mic-btn" id="mic-btn" title="Hold to speak">
        <svg class="mic-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span class="mic-label" id="mic-label">HOLD TO SPEAK</span>
        <div class="mic-ripple" id="mic-ripple"></div>
      </button>
    </div>

    <!-- Recording indicator -->
    <div class="rec-indicator hidden" id="rec-indicator">
      <span class="rec-dot"></span>
      <span>Listening...</span>
    </div>

    <!-- Suggestions removed — future feature -->

    <!-- Footer -->
    <div class="footer-text">
      Powered by <strong>Xwave</strong> &mdash; AI Voice Agent
    </div>

  </footer>

  <!-- Debug drawer -->
  <div class="debug-drawer" id="debug-drawer">
    <button class="debug-toggle" id="debug-toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Debug
    </button>
    <div class="debug-content hidden" id="debug-content">
      <pre id="debug-output">Agent trace info appears here after each turn.</pre>
      <a href="https://smith.langchain.com" target="_blank" class="debug-link">Open LangSmith Dashboard →</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
